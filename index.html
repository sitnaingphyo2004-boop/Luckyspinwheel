<!DOCTYPE html>

<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lucky Spin Wheel</title>

<!-- PWA -->

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0e17">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lucky Spin">
<link rel="apple-touch-icon" href="icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0f0e17;--card:#1a1830;--gold:#ffd700;--red:#e94560;--teal:#4ecdc4;}
body{
  background:var(--bg);
  font-family:'Noto Sans Myanmar','Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
}
#pts{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.pt{position:absolute;border-radius:50%;animation:ptFloat linear infinite;opacity:0;}
@keyframes ptFloat{
  0%{transform:translateY(100vh);opacity:0;}10%{opacity:var(--op);}
  90%{opacity:var(--op);}100%{transform:translateY(-10vh);opacity:0;}
}
.wrap{
  position:relative;z-index:1;width:100%;max-width:460px;
  padding:20px 16px max(50px,calc(50px + env(safe-area-inset-bottom)));
  display:flex;flex-direction:column;align-items:center;gap:22px;
}
header{text-align:center;}
header h1{
  font-family:'Fredoka One',cursive;
  font-size:clamp(2rem,8vw,3rem);
  background:linear-gradient(120deg,#ffd700,#ff6b6b,#4ecdc4,#ffd700);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shine 3s linear infinite;letter-spacing:2px;
}
@keyframes shine{to{background-position:200% center;}}
header p{color:rgba(255,255,255,.3);font-size:.72rem;letter-spacing:3px;margin-top:4px;}

.stat-pill{
background:var(–card);border:1px solid rgba(255,255,255,.08);
border-radius:999px;padding:6px 20px;
font-size:.8rem;color:rgba(255,255,255,.5);
}
.stat-pill b{color:var(–gold);}

.wheel-wrap{position:relative;width:320px;height:320px;}
.glow-ring{
position:absolute;inset:-6px;border-radius:50%;
background:conic-gradient(#ff6b6b,#ffe66d,#4ecdc4,#45b7d1,#96e6a1,#ff6b6b);
animation:ringRot 6s linear infinite;filter:blur(6px);opacity:.4;z-index:0;
}
@keyframes ringRot{to{transform:rotate(360deg);}}
canvas#cv{
position:relative;z-index:1;width:320px;height:320px;
border-radius:50%;display:block;
box-shadow:0 0 50px rgba(78,205,196,.2),0 20px 50px rgba(0,0,0,.65);
}
.ptr{
position:absolute;top:-22px;left:50%;
transform:translateX(-50%);z-index:5;
filter:drop-shadow(0 3px 8px rgba(0,0,0,.8));
}
.ptr svg{width:34px;height:44px;}

.spin-btn{
background:linear-gradient(135deg,#e94560,#b71c4f);
border:none;border-radius:999px;padding:15px 60px;
font-family:‘Fredoka One’,cursive;font-size:1.35rem;
color:#fff;letter-spacing:1px;cursor:pointer;
box-shadow:0 8px 24px rgba(233,69,96,.45),0 2px 0 rgba(0,0,0,.4);
transition:all .2s;position:relative;overflow:hidden;
}
.spin-btn::after{
content:’’;position:absolute;top:0;left:-100%;width:100%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
transition:left .4s;
}
.spin-btn:hover:not(:disabled)::after{left:100%;}
.spin-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 12px 28px rgba(233,69,96,.55);}
.spin-btn:active:not(:disabled){transform:translateY(0);}
.spin-btn:disabled{opacity:.45;cursor:not-allowed;}

.hist-title{text-align:center;font-size:.7rem;letter-spacing:2px;color:rgba(255,255,255,.25);margin-bottom:9px;}
.hist-list{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;min-height:24px;width:100%;}
.hist-chip{
padding:4px 13px;border-radius:999px;
font-size:.72rem;font-weight:700;
animation:popIn .25s forwards;opacity:0;
}
@keyframes popIn{to{opacity:1;}}

#overlay{
position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);
z-index:100;display:flex;align-items:center;justify-content:center;
opacity:0;pointer-events:none;transition:opacity .3s;
}
#overlay.show{opacity:1;pointer-events:all;}
.res-card{
background:linear-gradient(145deg,#1a1830,#0f0e17);
border:2px solid rgba(255,255,255,.12);border-radius:26px;
padding:40px 36px;text-align:center;width:min(90vw,310px);
transform:scale(.8) translateY(30px);
transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
}
#overlay.show .res-card{transform:scale(1) translateY(0);}
.res-emoji{font-size:4rem;display:block;animation:bnc .5s;}
@keyframes bnc{0%{transform:scale(0) rotate(-15deg);}65%{transform:scale(1.25) rotate(6deg);}100%{transform:scale(1) rotate(0);}}
.res-lbl{font-size:.68rem;letter-spacing:3px;color:rgba(255,255,255,.35);margin:8px 0 5px;}
.res-txt{font-family:‘Fredoka One’,cursive;font-size:1.9rem;color:#fff;margin-bottom:24px;text-shadow:0 0 20px currentColor;}
.res-close{
background:linear-gradient(135deg,#e94560,#b71c4f);border:none;border-radius:999px;
padding:11px 36px;color:#fff;font-family:‘Fredoka One’,cursive;
font-size:1rem;letter-spacing:1px;cursor:pointer;transition:transform .2s;
}
.res-close:hover{transform:scale(1.05);}

#cf{position:fixed;inset:0;pointer-events:none;z-index:200;}
.cfp{position:absolute;top:-12px;animation:cfFall linear forwards;border-radius:3px;}
@keyframes cfFall{to{transform:translateY(105vh) rotate(900deg);opacity:0;}}
</style>

</head>
<body>

<div id="pts"></div>
<div id="cf"></div>

<div id="overlay">
  <div class="res-card">
    <span class="res-emoji" id="resEmoji"></span>
    <div class="res-lbl">ရလဒ်</div>
    <div class="res-txt" id="resTxt"></div>
    <button class="res-close" onclick="closeResult()">ကောင်းပြီ!</button>
  </div>
</div>

<div class="wrap">
  <header>
    <h1>🎡 Lucky Spin Wheel</h1>
    <p>✦ ကံကြမ္မာစမ်းကြစို့ ✦</p>
  </header>

  <div class="stat-pill">🔄 စုစုပေါင်း <b id="totalEl">0</b> ကြိမ်လှည့်ပြီး</div>

  <div class="wheel-wrap">
    <div class="glow-ring"></div>
    <div class="ptr">
      <svg viewBox="0 0 34 44">
        <polygon points="17,42 1,10 33,10" fill="#FFD700" stroke="white" stroke-width="1.5"/>
        <circle cx="17" cy="11" r="5" fill="#FFD700" stroke="white" stroke-width="1.5"/>
      </svg>
    </div>
    <canvas id="cv" width="320" height="320"></canvas>
  </div>

<button class="spin-btn" id="spinBtn" onclick="doSpin()">🎯 လှည့်မယ်!</button>

  <div style="width:100%">
    <div class="hist-title">မှတ်တမ်း</div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>

<script>
const SEGS = [
  { label:"ထပ်မံကံစမ်းပါ",         short:"ကံစမ်းပါ", color:"#FF6B6B", emoji:"🔄", blank:true  },
  { label:"နောက်တစ်ကြိမ်\nလှည့်ပါ", short:"လှည့်ပါ",  color:"#FFD700", emoji:"↩️", blank:true  },
  { label:"M-150",                  short:"M-150",   color:"#4ECDC4", emoji:"⚡", blank:false },
  { label:"C-Vitt",                 short:"C-Vitt",  color:"#45B7D1", emoji:"🍊", blank:false },
  { label:"String",                 short:"String",  color:"#96E6A1", emoji:"🎸", blank:false },
];
const BLANKS=[0,1], PRIZES=[2,3,4];
const N=SEGS.length, ARC=(2*Math.PI)/N;

let _pos=0, totalSpins=0, spinning=false, rot=0;

// Particles
(function(){
  const pc=document.getElementById('pts');
  for(let i=0;i<55;i++){
    const d=document.createElement('div');d.className='pt';
    const sz=2+Math.random()*4,op=.08+Math.random()*.25;
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;
      background:hsl(${Math.random()*360},70%,70%);--op:${op};
      animation-duration:${7+Math.random()*12}s;animation-delay:${-Math.random()*15}s;`;
    pc.appendChild(d);
  }
})();

function draw(r){
  const cv=document.getElementById('cv');
  const ctx=cv.getContext('2d');
  const CX=cv.width/2,CY=cv.height/2,R=CX-4;
  ctx.clearRect(0,0,cv.width,cv.height);
  SEGS.forEach((seg,i)=>{
    const a0=r-Math.PI/2+i*ARC,a1=a0+ARC,am=a0+ARC/2;
    ctx.save();
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,a0,a1);ctx.closePath();
    const gx=CX+Math.cos(am)*R*.55,gy=CY+Math.sin(am)*R*.55;
    const gr=ctx.createRadialGradient(CX,CY,8,gx,gy,R*.9);
    gr.addColorStop(0,lighten(seg.color,40));gr.addColorStop(1,seg.color);
    ctx.fillStyle=gr;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.restore();
    ctx.save();
    ctx.translate(CX,CY);ctx.rotate(am);
    ctx.font='15px serif';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=4;ctx.fillStyle='#fff';
    ctx.fillText(seg.emoji,R-6,0);
    ctx.font='bold 11.5px "Noto Sans Myanmar","Segoe UI",sans-serif';ctx.shadowBlur=5;
    const lines=seg.label.split('\n');
    if(lines.length===1){ctx.fillText(lines[0],R-26,0);}
    else{ctx.fillText(lines[0],R-26,-7);ctx.fillText(lines[1],R-26,7);}
    ctx.restore();
  });
  ctx.save();
  ctx.beginPath();ctx.arc(CX,CY,R+1,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=2;ctx.stroke();ctx.restore();
  ctx.save();
  const hg=ctx.createRadialGradient(CX,CY,0,CX,CY,28);
  hg.addColorStop(0,'#fff');hg.addColorStop(1,'#ccc');
  ctx.beginPath();ctx.arc(CX,CY,28,0,Math.PI*2);
  ctx.fillStyle=hg;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=2;ctx.stroke();ctx.restore();
}

function lighten(hex,amt){
  const n=parseInt(hex.slice(1),16);
  return '#'+[Math.min(255,(n>>16)+amt),Math.min(255,((n>>8)&0xff)+amt),Math.min(255,(n&0xff)+amt)]
    .map(v=>v.toString(16).padStart(2,'0')).join('');
}

function pickTarget(){
  if(_pos<5) return BLANKS[Math.floor(Math.random()*BLANKS.length)];
  return PRIZES[Math.floor(Math.random()*PRIZES.length)];
}

function doSpin(){
  if(spinning)return;
  spinning=true; totalSpins++;
  document.getElementById('totalEl').textContent=totalSpins;
  document.getElementById('spinBtn').disabled=true;
  spinTo(pickTarget());
}

function spinTo(segIdx){
  const nudge=(Math.random()*.7-.35)*ARC;
  const targetRot=-segIdx*ARC-ARC/2+nudge;
  const fullSpins=6+Math.floor(Math.random()*5);
  let diff=((targetRot-rot)%(2*Math.PI));
  if(diff>0)diff-=2*Math.PI;
  const finalRot=rot+diff-fullSpins*2*Math.PI;
  const startRot=rot,dur=4200+Math.random()*1500,t0=performance.now();
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    rot=startRot+(finalRot-startRot)*ease(t);
    draw(rot);
    if(t<1){requestAnimationFrame(frame);return;}
    rot=finalRot;draw(rot);
    spinning=false;
    _pos++; if(_pos>5)_pos=0;
    document.getElementById('spinBtn').disabled=false;
    setTimeout(()=>showResult(segIdx),350);
  }
  requestAnimationFrame(frame);
}

function showResult(idx){
  const s=SEGS[idx];
  document.getElementById('resEmoji').textContent=s.emoji;
  document.getElementById('resTxt').textContent=s.label.replace('\n','');
  document.getElementById('resTxt').style.color=s.color;
  document.getElementById('overlay').classList.add('show');
  addHist(idx);
  if(!s.blank)doConfetti(s.color);
}
function closeResult(){document.getElementById('overlay').classList.remove('show');}
document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay'))closeResult();
});

function addHist(idx){
  const s=SEGS[idx];
  const list=document.getElementById('histList');
  const c=document.createElement('div');c.className='hist-chip';
  c.textContent=`#${totalSpins} ${s.emoji} ${s.short}`;
  c.style.cssText=`background:${s.color}22;border:1px solid ${s.color}55;color:${s.color};`;
  list.insertBefore(c,list.firstChild);
  while(list.children.length>14)list.removeChild(list.lastChild);
}

function doConfetti(mc){
  const cols=[mc,'#FFD700','#FF6B6B','#4ECDC4','#FFE66D','#96E6A1','#fff'];
  const con=document.getElementById('cf');
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='cfp';
    const w=6+Math.random()*8;
    c.style.cssText=`width:${w}px;height:${w}px;left:${Math.random()*100}vw;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      animation-duration:${1.8+Math.random()*2.2}s;
      animation-delay:${Math.random()*.7}s;`;
    con.appendChild(c);setTimeout(()=>c.remove(),4500);
  }
}

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

draw(rot);
</script>

</body>
</html>
